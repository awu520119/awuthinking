baseURL: "https://awuthinking.top/"
relativeURLs: false
defaultContentLanguage: zh
title: "阿無的留白"
theme: "PaperMod"
enableRobotsTXT: true

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

caches:
  images:
    dir: :cacheDir/images

taxonomies:
  category: categories
  tag: tags
  series: series

languages:
  zh:
    label: "简体中文"
    locale: "zh-CN"
    weight: 1

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  env: production
  description: "清空旧我，接纳未知。在無处留白，让新知生长。"
  assets:
    favicon: /icons/favicon.ico
    favicon16x16: /icons/favicon-16x16.png
    favicon32x32: /icons/favicon-32x32.png
    apple_touch_icon: /icons/apple-touch-icon.png
    safari_pinned_tab: /icons/safari-pinned-tab.svg
    theme_color: "#f5efe2"
    msapplication_TileColor: "#f5efe2"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  mainSections:
    - posts
  homeInfoParams:
    Title: "以無为始，从無处生"
    Content: "“天下万物生于有，有生于無。”——《道德经》\n\n于旧我之废墟，生新知之萌芽。"

menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 10
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 20
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 30
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 40
    - identifier: about
      name: 关于
      url: /about/
      weight: 60
